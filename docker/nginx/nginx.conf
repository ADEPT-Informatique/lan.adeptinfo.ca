server {
  listen 8000 ssl;
  root /opt/lanadept/lumen/public;
  index index.php index.htm index.html;

  server_name api.localhost www.api.localhost;

  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

  location / {
      try_files $uri $uri/ /index.php?$query_string;
  }

  location /index.php {
      proxy_redirect off;
      fastcgi_pass  lumen:9000;
      include fastcgi_params;
      fastcgi_connect_timeout 10s;
      fastcgi_read_timeout 10s;
      fastcgi_buffers 256 4k;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
  }
}

upstream client-admin {
    server client-admin:4201;
}

server {
  listen 4201 ssl;
  server_name localhost www.localhost;

  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
  ssl_session_cache builtin:1000 shared:SSL:10m;
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
  ssl_ciphers HIGH:!aNULL:!eNULL:!EXPORT:!CAMELLIA:!DES:!MD5:!PSK:!RC4;
  ssl_prefer_server_ciphers on;

  location / {
      proxy_pass       https://client-admin;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $http_connection;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 90;
  }
}

upstream client-player {
    server client-player:4200;
}

server {
  listen 4200 ssl;
  server_name localhost www.localhost;

  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
