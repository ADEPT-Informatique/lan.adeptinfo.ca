version: '2.0'

# Devrais être utilisé avec docker-compose.yml.
# Monte l'application dans les containers avec des volumes.

services:

  nginx:
    ports:
      - ${LANADEPT_WEBSITE_PORT}:80
    command: |
      bash -c "bash -s <<EOF
      /opt/wait-for-it/wait-for-it.sh --timeout=0 lumen:9000 && \
      nginx -g \"daemon off;\"
      EOF"

  lumen:
    tty: true
    volumes:
      - ./api:/var/www/html:rw

  mariadb:
    ports:
      - "3306:3306"